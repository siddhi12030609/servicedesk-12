<!DOCTYPE html>
<html>
<head>

<title>User Dashboard</title>
<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<div class="dashboard-container">

<h1>User Dashboard</h1>

<p id="welcomeText">Welcome user</p>

<button class="logout-btn">Logout</button>


<!-- CREATE REQUEST -->

<div class="card">

<h2>Create Request</h2>

<input type="text" id="title" placeholder="Issue Title">

<textarea id="description" placeholder="Describe your issue"></textarea>

<button onclick="createRequest()">Submit Request</button>

</div>


<!-- MY REQUESTS -->

<div class="card">

<h2>My Requests</h2>

<table id="requestTable">

<thead>

<tr>
<th>ID</th>
<th>Title</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>


<!-- NOTIFICATIONS -->

<div class="card">

<h2>Notifications</h2>

<ul id="notifications"></ul>

</div>


</div>


<!-- CHATBOT BUTTON -->

<div class="chatbot-btn" onclick="openChatbot()">
💬
</div>


<script src="dashboard.js"></script>

</body>
</html>
